<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <defs>
    <filter id="rough" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.028" numOctaves="4" seed="17" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="32" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="fade" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <!-- Main shape displaced to look like brush strokes -->
  <ellipse cx="200" cy="278" rx="182" ry="258" fill="white" filter="url(#rough)"/>
  <!-- Soft fade on top edge for ink-wash feel -->
  <rect x="0" y="0" width="400" height="80" fill="url(#topFade)" filter="url(#fade)"/>
  <defs>
    <linearGradient id="topFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="black" stop-opacity="1"/>
      <stop offset="100%" stop-color="black" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
